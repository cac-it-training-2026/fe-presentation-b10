<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1: 共通鍵暗号方式の特徴として正しいものを選んでください。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. 暗号化と復号で異なる鍵を使う
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. 暗号化と復号で同じ鍵を使う
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 鍵を使わずに暗号化する
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. 公開鍵をインターネット上に公開する
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. 暗号化と復号で同じ鍵を使う</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        「暗号化と復号で同じ鍵を使う」という部分が、共通鍵暗号方式の最大の特徴です。しかし、暗号化に使用した鍵を手に入れることができたら、誰でも復号することができるという欠点があります。
                    </p>
                </div>
                 </details>
                <div class="button004">
    <a href="question02.html">次の問題へ</a>
</div>
               
    </body>
</html>
