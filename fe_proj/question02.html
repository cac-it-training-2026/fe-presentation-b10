<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題3: 鍵の安全な配布が「容易」かつ、暗号化・復号の相対的な処理速度が「遅い」暗号化方式はどれですか。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. 共通鍵暗号方式
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. 公開鍵暗号方式
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. 秘密鍵暗号方式
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. どれでもない
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. 公開鍵暗号方式</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        文章を復号するのに必要な秘密鍵は本人だけが持ち、公開鍵は秘密にする必要がないため安全に配布することができます。また、暗号化や復号の処理が複雑な数学的演算を伴うため、共通鍵暗号方式と比較すると処理速度が遅い傾向があります。
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
