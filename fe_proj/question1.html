<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1: 公開鍵暗号方式を用いて、図のようにAからBへ、他人に秘密にしておきたい文書を送るとき、暗号化に用いる鍵Kとして、適切なものはどれか。</h3>

			<h4 class="quiz-irust">
				<div style="text-align:center;">
				<img src="images/Question-1.jpg" style="width: 400px;height: auto;">
				</div>
				
			
            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. Aの公開鍵
                    
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. Aの秘密鍵
                   
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. Bの公開鍵
                    
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. 共通の秘密鍵
                    
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：3. Bの公開鍵</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        公開鍵暗号方式による暗号化通信では、送信者は受信者の<span style="color:#ff0000;">公開鍵</span>で暗号化した文書を送信し、
                        受信者は自身の<span style="color:#ff0000;">秘密鍵</span>で複合を行います。
                    </p>    <p>問題において受信者がBとなるため、AはBの<span style="color:#ff0000;">公開鍵</span>で暗号化を行い
                        Bが自身のの<span style="color:#ff0000;">秘密鍵</span>で複合を行うことができる
                        </p>
                        <p>したがって暗号化に必要になるものは「Bの公開鍵」となる。
                        </p>
                        
                    
                </div>
                 <ul>
					<li>
						<a href="question02.html">
							次の問題へ
							</a>
							</li>
							</ul>

            </details>
        </div>
    </body>
</html>
